site_name: CoppeliaSim 4.10 con Python
site_description: Manual de Robótica y Simulación para Formación Profesional
site_author: José Aguilera

theme:
  name: material
  language: es
  #custom_dir: overrides
  logo: assets/logos/logo.svg
  favicon: assets/logos/favicon.png
  features:
    - navigation.footer
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate

  font:
    text: Roboto
    code: JetBrains Mono

  palette:
    - scheme: default
      primary: blue
      accent: indigo
    - scheme: slate
      primary: blue
      accent: indigo


extra_css:
  - assets/css/coppeliasim-fp.css

extra_javascript:
  - assets/js/coppeliasim-fp.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 2-4
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom

plugins:
  - search
  - mermaid2
  - fp_book
  - minify:
      minify_html: true

nav:
  - Inicio: index.md
  - Prólogo: prologo.md
  - Introducción: introduccion.md
  - Parte I:
      - Primer contacto: parte1/index.md
      - Capítulo 1: parte1/capitulo01.md
      - Capítulo 2: parte1/capitulo02.md
      - Capítulo 3: parte1/capitulo03.md
      - Capítulo 4: parte1/capitulo04.md
      - Capítulo 5: parte1/capitulo05.md
      - Capítulo 6: parte1/capitulo06.md

  - Parte II:
      - Primer robot: parte2/index.md
  - Parte III:
      - Python y CoppeliaSim: parte3/index.md
  - Parte IV:
      - Curso práctico: parte4/index.md
  - Parte V:
      - Solucionario: parte5/index.md
  - Parte VI:
      - Recursos profesor: parte6/index.md

  - Editorial:
      - Inicio: editorial/index.md
      - Design System: editorial/design-system.md
      - Colores: editorial/colores.md
      - Tipografía: editorial/tipografia.md
      - Iconografía: editorial/iconografia.md
      - Figuras: editorial/figuras.md
      - Diagramas: editorial/diagramas.md
      - Componentes: editorial/componentes.md
      - Plantillas: editorial/plantillas.md

